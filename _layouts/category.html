---
layout: default
---
{% for post in site.posts %}
{% if page.title == "Archive" or post.tags contains page.title %}
<h2><a href='{{ post.url | remove:".html" }}'>{{ post.title }}</a> _ {{ post.date | date: "%Y-%m-%d, %a" }}</h2>
<p class="taglist">
	{% for tag in post.tags %}
	{{ tag  }}
	{% endfor %}
</p>
<p>{{ post.excerpt }}</p>
{% endif %}
{% endfor %}
